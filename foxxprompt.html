<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 foxxprompt | Advanced CLI Prompt Architect</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #ff8c00; /* Fox Orange */
            --accent-hover: #ff9f2e;
            --border-color: #3e2723; /* Earthy Dark */
            --input-bg: #0d1117;
            --button-hover: #e67e22;
            --mono-font: 'Fira Code', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Structure */
        .sidebar {
            width: 500px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        /* Typography */
        h1 {
            font-size: 1.6rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
        }

        h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: #ffb74d;
            margin-bottom: 12px;
            margin-top: 20px;
            border-left: 3px solid var(--accent-color);
            padding-left: 8px;
        }

        /* Form Elements */
        .field-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-weight: 600;
            color: #d1d5db;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 10px 12px;
            font-size: 0.85rem;
            font-family: var(--mono-font);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2);
        }

        /* Prompt Preview */
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #prompt-output {
            flex: 1;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            font-family: var(--mono-font);
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
            color: #e6edf3;
        }

        /* Buttons */
        .btn {
            background-color: #d35400; /* Deep Fox Orange */
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-copy {
            background-color: #2c1e14;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-copy:hover {
            background-color: #3e2723;
        }

        /* Animation */
        .copy-success {
            color: #ffb74d;
            font-size: 0.8rem;
            margin-right: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-success.visible {
            opacity: 1;
        }

        section {
            padding-bottom: 15px;
            border-bottom: 1px solid #2c1e14;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1>🦊 foxxprompt</h1>

        <section>
            <h2>🎯 CORE OBJECTIVE</h2>
            <div class="field-group">
                <label for="goal">Primary Goal & Intent</label>
                <textarea id="goal" placeholder="What is the ultimate outcome? Explain the 'why' and 'what'."></textarea>
            </div>
            <div class="field-group">
                <label for="failure_state">Current Failure State (if bug)</label>
                <textarea id="failure_state" placeholder="Describe the error, stack trace, or incorrect behavior."></textarea>
            </div>
        </section>

        <section>
            <h2>🏗️ ARCHITECTURAL CONTEXT</h2>
            <div class="field-group">
                <label for="stack">Tech Stack & Versions</label>
                <input type="text" id="stack" placeholder="e.g., Python 3.12, FastAPI, SQLAlchemy 2.0, PostgreSQL 16">
            </div>
            <div class="field-group">
                <label for="files">Relevant File Paths</label>
                <textarea id="files" placeholder="List the specific files that must be modified or referenced."></textarea>
            </div>
            <div class="field-group">
                <label for="patterns">Design Patterns & Data Flow</label>
                <textarea id="patterns" placeholder="e.g., Repository pattern, Event-driven via Redis, Hexagonal Architecture."></textarea>
            </div>
            <div class="field-group">
                <label for="schema">Database Schema / API Specs</label>
                <textarea id="schema" placeholder="Describe relevant tables, fields, or API endpoints involved."></textarea>
            </div>
        </section>

        <section>
            <h2>🛠️ RIGOROUS CONSTRAINTS</h2>
            <div class="field-group">
                <label for="conventions">Coding Style & Guidelines</label>
                <textarea id="conventions" placeholder="e.g., Use functional components, strict typing, Airbnb style, JSDoc."></textarea>
            </div>
            <div class="field-group">
                <label for="security">Security & Compliance</label>
                <textarea id="security" placeholder="e.g., No PII in logs, Sanitize all inputs, Use bcrypt for passwords."></textarea>
            </div>
            <div class="field-group">
                <label for="performance">Performance & Scalability</label>
                <input type="text" id="performance" placeholder="e.g., Avoid O(n^2), Use streams for large files, Caching strategy.">
            </div>
            <div class="field-group">
                <label for="dependencies">Dependency Restrictions</label>
                <textarea id="dependencies" placeholder="e.g., Do not add new NPM packages, Use native Node modules where possible."></textarea>
            </div>
            <div class="field-group">
                <label for="edge_cases">Edge Cases & Error Handling</label>
                <textarea id="edge_cases" placeholder="How should we handle network timeouts, empty states, or invalid data?"></textarea>
            </div>
        </section>

        <section>
            <h2>✅ VERIFICATION STRATEGY</h2>
            <div class="field-group">
                <label for="testing">Test Suite & Runner</label>
                <input type="text" id="testing" placeholder="e.g., Pytest with 90% coverage requirement, Vitest.">
            </div>
            <div class="field-group">
                <label for="verification">Step-by-Step Validation</label>
                <textarea id="verification" placeholder="1. Run unit tests. 2. Verify with manual curl. 3. Check logs for X."></textarea>
            </div>
        </section>
    </aside>

    <main class="main">
        <div class="preview-header">
            <h2>🦊 Generated Markdown Prompt</h2>
            <div style="display: flex; align-items: center;">
                <span id="copy-status" class="copy-success">🐾 Snatched!</span>
                <button class="btn btn-copy" onclick="copyPrompt()">🐾 Copy to Clipboard</button>
            </div>
        </div>
        <div id="prompt-output"></div>
    </main>

    <script>
        const inputs = [
            'goal', 'failure_state', 'stack', 'files', 'patterns', 'schema',
            'conventions', 'security', 'performance', 'dependencies', 'edge_cases',
            'testing', 'verification'
        ];
        
        const output = document.getElementById('prompt-output');

        function generatePrompt() {
            const data = {};
            inputs.forEach(id => {
                data[id] = document.getElementById(id).value.trim();
            });

            let prompt = `# 🦊 CORE OBJECTIVE\n${data.goal || '[Explain your primary goal]'}\n\n`;
            
            if (data.failure_state) {
                prompt += `## ❌ CURRENT FAILURE STATE\n${data.failure_state}\n\n`;
            }

            prompt += `# 🏗️ ARCHITECTURAL CONTEXT\n`;
            prompt += `- **Tech Stack:** ${data.stack || 'N/A'}\n`;
            prompt += `- **Key File Paths:** ${data.files || 'N/A'}\n`;
            prompt += `- **Design Patterns & Data Flow:** ${data.patterns || 'N/A'}\n`;
            prompt += `- **Database / API Specs:** ${data.schema || 'N/A'}\n\n`;

            prompt += `# 🛠️ RIGOROUS CONSTRAINTS\n`;
            prompt += `## 📜 Coding Standards\n${data.conventions || 'Follow existing codebase patterns.'}\n\n`;
            prompt += `## 🔒 Security & Compliance\n${data.security || 'Ensure standard security practices are followed.'}\n\n`;
            prompt += `## 🚀 Performance & Scalability\n${data.performance || 'Optimize for standard performance metrics.'}\n\n`;
            prompt += `## 📦 Dependency Restrictions\n${data.dependencies || 'N/A'}\n\n`;
            prompt += `## ⚠️ Edge Cases & Error Handling\n${data.edge_cases || 'Handle all standard edge cases and potential failures.'}\n\n`;

            prompt += `# ✅ VERIFICATION & TESTING\n`;
            prompt += `- **Test Suite:** ${data.testing || 'N/A'}\n`;
            prompt += `## 🧪 Validation Steps\n${data.verification || 'Verify implementation with comprehensive tests.'}\n\n`;

            prompt += `# 🦊 INSTRUCTIONS FOR AGENT\n`;
            prompt += `1. **Research Phase:** Systematically map the codebase and validate all architectural assumptions.\n`;
            prompt += `2. **Strategy Phase:** Formulate a surgical, idiomatic plan that respects all listed constraints.\n`;
            prompt += `3. **Execution Phase:** Implement the changes, ensuring they are complete and follow local conventions.\n`;
            prompt += `4. **Validation Phase:** Rigorously verify the solution using the specified verification strategy.`;

            output.textContent = prompt;
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', generatePrompt);
        });

        function copyPrompt() {
            const text = output.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.add('visible');
                setTimeout(() => status.classList.remove('visible'), 2000);
            });
        }

        // Initial generation
        generatePrompt();
    </script>
</body>
</html>
