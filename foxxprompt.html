<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 foxxprompt | AI Prompt Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦊</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #16161f;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.3);
            --accent-secondary: #ff9f35;
            --border: #2a2a35;
            --border-light: #3a3a45;
            --success: #35ff6b;
            --error: #ff3555;
            --mono-font: 'SF Mono', 'Fira Code', 'Monaco', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 16px; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255, 159, 53, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 420px;
            min-width: 420px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .type-selector {
            display: flex;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 6px;
            border-radius: 12px;
        }

        .type-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .type-btn:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .type-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .type-btn .icon { font-size: 1.3rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-light);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
            border-radius: 2px;
        }

        .quick-actions {
            display: flex;
            gap: 6px;
        }

        .quick-btn {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .field-group {
            margin-bottom: 14px;
        }

        .field-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px 14px;
            font-size: 0.8rem;
            font-family: inherit;
            transition: var(--transition);
            resize: vertical;
        }

        textarea {
            min-height: 60px;
            line-height: 1.5;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        .preset-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .preset-chip {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .preset-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-success {
            color: var(--success);
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-success.visible { opacity: 1; }

        .prompt-output {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            font-family: var(--mono-font);
            font-size: 0.78rem;
            line-height: 1.7;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #e8e8f0;
        }

        .prompt-output .section {
            margin-bottom: 16px;
        }

        .prompt-output .section-title {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .prompt-output .section-title::before {
            content: '▸';
            color: var(--accent-secondary);
        }

        .prompt-output .section-content {
            color: var(--text-secondary);
            padding-left: 12px;
        }

        .prompt-output .quality-list {
            margin-top: 8px;
            padding-left: 12px;
        }

        .prompt-output .quality-list li {
            color: var(--text-muted);
            margin-bottom: 4px;
            font-size: 0.75rem;
        }

        .prompt-output .placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .history-bar {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow-x: auto;
            margin-top: auto;
        }

        .history-item {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.65rem;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .history-item:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .history-empty {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.8rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.4s ease-out; }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; min-width: 0; max-height: none; }
            .main { padding: 16px; }
            .prompt-output { min-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🦊</div>
                <div>
                    <div class="logo-text">foxxprompt</div>
                    <div class="logo-sub">AI Prompt Generator</div>
                </div>
            </div>

            <div class="type-selector">
                <button class="type-btn active" data-type="code" onclick="selectType('code')">
                    <span class="icon">💻</span>
                    <span>Code</span>
                </button>
                <button class="type-btn" data-type="image" onclick="selectType('image')">
                    <span class="icon">🎨</span>
                    <span>Image</span>
                </button>
                <button class="type-btn" data-type="writing" onclick="selectType('writing')">
                    <span class="icon">✍</span>
                    <span>Write</span>
                </button>
                <button class="type-btn" data-type="video" onclick="selectType('video')">
                    <span class="icon">🎬</span>
                    <span>Video</span>
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Core Concept</div>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="loadExample()">Example</button>
                        <button class="quick-btn" onclick="clearForm()">Clear</button>
                    </div>
                </div>
                <div class="field-group">
                    <label id="label-objective">🎯 Objective</label>
                    <textarea id="objective" placeholder="What do you want to achieve? Be specific about the end result."></textarea>
                </div>
                <div class="field-group">
                    <label id="label-context">🔧 Context</label>
                    <textarea id="context" placeholder="Background information, existing code, constraints, relevant details..."></textarea>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title" id="details-title">Technical Details</div>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="loadPreset()">Presets</button>
                    </div>
                </div>
                <div class="field-group" id="field-style">
                    <label id="label-style">Tech Stack</label>
                    <input type="text" id="style" placeholder="e.g., React, TypeScript, Node.js...">
                    <div class="preset-chips" id="style-presets"></div>
                </div>
                <div class="field-group" id="field-audience">
                    <label id="label-audience">👥 Audience</label>
                    <input type="text" id="audience" placeholder="Who will use/interact with this?">
                </div>
                <div class="field-group" id="field-format">
                    <label id="label-format">📐 Output Format</label>
                    <input type="text" id="format" placeholder="e.g., single file, full project, API...">
                    <div class="preset-chips" id="format-presets"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Tone & Style</div>
                </div>
                <div class="field-group">
                    <label id="label-tone">Tone</label>
                    <select id="tone">
                        <option value="">Select tone...</option>
                        <option value="professional">Professional - Clean, formal, business-ready</option>
                        <option value="casual">Casual - Friendly, relaxed, conversational</option>
                        <option value="technical">Technical - Detailed, precise, expert-level</option>
                        <option value="educational">Educational - Clear, instructive, learning-focused</option>
                        <option value="creative">Creative - Bold, imaginative, innovative</option>
                        <option value="minimal">Minimal - Concise, efficient, no-nonsense</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Constraints (What to avoid)</label>
                    <input type="text" id="constraints" placeholder="Elements, approaches, or styles to avoid...">
                </div>
            </div>

            <div class="history-bar" id="history-bar">
                <span class="history-empty">No recent prompts</span>
            </div>
        </aside>

        <main class="main">
            <div class="preview-header">
                <div class="preview-title">
                    <span style="color: var(--accent);">✦</span> Generated Prompt
                </div>
                <div class="preview-actions">
                    <span id="copy-status" class="copy-success">✓ Copied!</span>
                    <button class="btn btn-secondary" onclick="copyPrompt()">
                        <span>📋</span> Copy
                    </button>
                    <button class="btn btn-primary" onclick="saveToHistory()">
                        <span>💾</span> Save
                    </button>
                </div>
            </div>
            <div class="prompt-output" id="prompt-output"></div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentType = 'code';
        let promptHistory = JSON.parse(localStorage.getItem('foxxprompt_history') || '[]');

        const typeConfig = {
            code: {
                detailsTitle: 'Technical Details',
                styleLabel: 'Tech Stack / Framework',
                stylePlaceholder: 'e.g., React, TypeScript, Node.js, Python...',
                stylePresets: ['React', 'Vue', 'Node.js', 'Python', 'TypeScript', 'Go', 'Rust'],
                formatLabel: 'Output Format',
                formatPresets: ['Single file', 'Full project', 'API endpoint', 'Component', 'Script'],
                audienceLabel: 'Target Users',
                contextLabel: 'Existing Code / Context',
                contextPlaceholder: 'Files to modify, codebase patterns, libraries to use...',
                objectiveLabel: '🎯 What to Build',
                objectivePlaceholder: 'Describe the feature, bug fix, or refactor needed...',
                toneOptions: ['professional', 'technical', 'minimal', 'educational', 'creative']
            },
            image: {
                detailsTitle: 'Visual Details',
                styleLabel: 'Art Style / Medium',
                stylePlaceholder: 'e.g., photorealistic, oil painting, anime, 3D render...',
                stylePresets: ['Photorealistic', 'Oil Painting', 'Anime', '3D Render', 'Digital Art', 'Watercolor', 'Cyberpunk'],
                formatLabel: 'Dimensions / Aspect',
                formatPresets: ['16:9 landscape', '1:1 square', '9:16 portrait', '4:3 standard', '4K', '8K'],
                audienceLabel: 'Art Direction',
                contextLabel: 'Color & Mood',
                contextPlaceholder: 'Color palette, mood, emotional tone, reference artists...',
                objectiveLabel: '🎯 Visual Goal',
                objectivePlaceholder: 'Describe what you want to see - subjects, scenes, concepts...',
                toneOptions: ['professional', 'creative']
            },
            writing: {
                detailsTitle: 'Content Details',
                styleLabel: 'Content Type / Genre',
                stylePlaceholder: 'e.g., blog post, technical docs, email, story...',
                stylePresets: ['Blog Post', 'Article', 'Documentation', 'Email', 'Story', 'Script', 'Social Media'],
                formatLabel: 'Format / Length',
                formatPresets: ['500 words', '1000 words', '2000 words', 'Brief', 'Detailed', 'Bulleted list'],
                audienceLabel: 'Target Readers',
                contextLabel: 'Purpose / Context',
                contextPlaceholder: 'Why are you writing this? What action should readers take?',
                objectiveLabel: '🎯 Content Goal',
                objectivePlaceholder: 'What message or information do you want to convey?',
                toneOptions: ['professional', 'casual', 'educational', 'creative']
            },
            video: {
                detailsTitle: 'Production Details',
                styleLabel: 'Visual Style / Genre',
                stylePlaceholder: 'e.g., cinematic, documentary, animated, vlog...',
                stylePresets: ['Cinematic', 'Documentary', 'Vlog', 'Animation', 'Tutorial', 'Music Video', 'Commercial'],
                formatLabel: 'Resolution / Platform',
                formatPresets: ['1080p', '4K', '16:9', '9:16 TikTok', 'Vertical', 'YouTube', 'Instagram'],
                audienceLabel: 'Viewers',
                contextLabel: 'Audio / Music',
                contextPlaceholder: 'Background music style, voiceover, sound effects...',
                objectiveLabel: '🎯 Video Goal',
                objectivePlaceholder: 'What story or message should the video convey?',
                toneOptions: ['professional', 'casual', 'creative']
            }
        };

        const examples = {
            code: {
                objective: 'Build a React hook for managing complex form state with validation',
                context: 'Using React 18, TypeScript, and Zod for validation. Need to handle nested forms, array fields, and async validation.',
                style: 'React, TypeScript, Zod',
                audience: 'Frontend developers using the hook in production apps',
                format: 'Single TypeScript file with comprehensive comments',
                tone: 'technical',
                constraints: 'Avoid external dependencies beyond React and Zod'
            },
            image: {
                objective: 'A majestic fox sitting on a cliff at sunset',
                context: 'Warm golden hour lighting, dramatic clouds, cinematic atmosphere',
                style: 'Photorealistic, digital painting',
                audience: 'Fantasy art enthusiasts',
                format: '16:9 landscape, 4K',
                tone: 'creative',
                constraints: 'Avoid cartoonish style, no text in image'
            },
            writing: {
                objective: 'Explain how to build a REST API from scratch',
                context: 'For beginner developers who know basic JavaScript',
                style: 'Tutorial / How-to guide',
                audience: 'Junior developers learning backend',
                format: 'Step-by-step blog post, ~1500 words',
                tone: 'educational',
                constraints: 'Avoid jargon without explanation'
            },
            video: {
                objective: 'A quick product demo for a SaaS dashboard',
                context: 'High-energy, showing key features in under 60 seconds',
                style: 'Modern tech demo, fast cuts',
                audience: 'Potential customers visiting landing page',
                format: 'Vertical 9:16, 60 seconds',
                tone: 'professional',
                constraints: 'No talking head, just screen recording with motion'
            }
        };

        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            updateFormLabels();
            generatePrompt();
        }

        function updateFormLabels() {
            const config = typeConfig[currentType];
            document.getElementById('details-title').textContent = config.detailsTitle;
            document.getElementById('label-style').textContent = config.styleLabel;
            document.getElementById('style').placeholder = config.stylePlaceholder;
            document.getElementById('label-format').textContent = config.formatLabel;
            document.getElementById('label-audience').textContent = config.audienceLabel;
            document.getElementById('label-context').textContent = config.contextLabel;
            document.getElementById('label-objective').textContent = config.objectiveLabel;
            document.getElementById('objective').placeholder = config.objectivePlaceholder;

            const toneSelect = document.getElementById('tone');
            toneSelect.innerHTML = '<option value="">Select tone...</option>';
            config.toneOptions.forEach(tone => {
                const option = document.createElement('option');
                option.value = tone;
                option.textContent = tone.charAt(0).toUpperCase() + tone.slice(1);
                toneSelect.appendChild(option);
            });

            renderPresets(config);
        }

        function renderPresets(config) {
            const stylePresets = document.getElementById('style-presets');
            const formatPresets = document.getElementById('format-presets');
            stylePresets.innerHTML = config.stylePresets.map(s => 
                `<span class="preset-chip" onclick="setField('style', '${s}')">${s}</span>`
            ).join('');
            formatPresets.innerHTML = config.formatPresets.map(f => 
                `<span class="preset-chip" onclick="setField('format', '${f}')">${f}</span>`
            ).join('');
        }

        function setField(id, value) {
            document.getElementById(id).value = value;
            generatePrompt();
        }

        function loadExample() {
            const ex = examples[currentType];
            document.getElementById('objective').value = ex.objective;
            document.getElementById('context').value = ex.context;
            document.getElementById('style').value = ex.style;
            document.getElementById('audience').value = ex.audience;
            document.getElementById('format').value = ex.format;
            document.getElementById('tone').value = ex.tone;
            document.getElementById('constraints').value = ex.constraints;
            generatePrompt();
        }

        function clearForm() {
            ['objective', 'context', 'style', 'audience', 'format', 'tone', 'constraints'].forEach(id => {
                document.getElementById(id).value = '';
            });
            generatePrompt();
        }

        function getValue(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : '';
        }

        function generatePrompt() {
            const objective = getValue('objective');
            const context = getValue('context');
            const style = getValue('style');
            const audience = getValue('audience');
            const format = getValue('format');
            const tone = getValue('tone');
            const constraints = getValue('constraints');

            let prompt = `## 🎯 OBJECTIVE\n${objective || '[Describe what you want to achieve]'}\n\n`;

            prompt += `## 📋 CONTEXT\n`;
            if (context) {
                prompt += `${context}\n`;
            } else {
                prompt += `[Add background details, constraints, or relevant information]\n`;
            }
            prompt += `\n`;

            prompt += generateStyleSection();
            prompt += `\n`;

            if (audience) {
                prompt += `## 👥 AUDIENCE\n${audience}\n\n`;
            }

            if (format) {
                prompt += `## 📐 OUTPUT FORMAT\n${format}\n\n`;
            }

            if (tone) {
                prompt += generateToneSection();
            }

            if (constraints) {
                prompt += `## ⚠️ CONSTRAINTS\n- Avoid: ${constraints}\n\n`;
            }

            prompt += generateQualityRequirements();

            document.getElementById('prompt-output').innerHTML = formatPromptOutput(prompt);
        }

        function generateStyleSection() {
            switch(currentType) {
                case 'code':
                    return `## 💻 TECH STACK\n${getValue('style') || '[Specify frameworks, languages, libraries]'}\n\n`;
                case 'image':
                    return `## 🎨 ART STYLE\n${getValue('style') || '[Define the visual style, medium, or aesthetic]'}\n\n`;
                case 'writing':
                    return `## 📝 CONTENT TYPE\n${getValue('style') || '[Specify the type of content or genre]'}\n\n`;
                case 'video':
                    return `## 🎬 STYLE / GENRE\n${getValue('style') || '[Define the visual style or production type]'}\n\n`;
            }
        }

        function generateToneSection() {
            const tone = getValue('tone');
            const toneGuides = {
                professional: 'Clean, formal, business-appropriate language. Use precise terminology.',
                casual: 'Friendly, relaxed, conversational. Use natural phrasing.',
                technical: 'Detailed, precise, expert-level. Include technical specifics.',
                educational: 'Clear, instructive, patient. Explain concepts thoroughly.',
                creative: 'Bold, imaginative, innovative. Use creative language.',
                minimal: 'Concise, efficient, no-nonsense. Remove unnecessary words.'
            };
            return `## 🎭 TONE & STYLE\n${toneGuides[tone] || ''}\n\n`;
        }

        function generateQualityRequirements() {
            let reqs = '## ✅ QUALITY REQUIREMENTS\n';
            switch(currentType) {
                case 'code':
                    reqs += '- Write clean, modular, production-ready code\n';
                    reqs += '- Include comprehensive comments and documentation\n';
                    reqs += '- Implement proper error handling and edge cases\n';
                    reqs += '- Follow security best practices (input validation, no hardcoded secrets)\n';
                    reqs += '- Optimize for performance where applicable\n';
                    reqs += '- Use modern language features and best practices\n';
                    reqs += '- Include unit tests or testing approach\n';
                    break;
                case 'image':
                    reqs += '- Create balanced, visually compelling composition\n';
                    reqs += '- Ensure proper lighting, shadows, and depth\n';
                    reqs += '- Pay attention to details, textures, and materials\n';
                    reqs += '- Maintain consistent style throughout\n';
                    reqs += '- Deliver high-resolution output\n';
                    reqs += '- Avoid artifacts, distortions, or visual errors\n';
                    break;
                case 'writing':
                    reqs += '- Write engaging, well-structured content\n';
                    reqs += '- Ensure clarity, coherence, and logical flow\n';
                    reqs += '- Use appropriate vocabulary for the target audience\n';
                    reqs += '- Maintain consistent tone throughout\n';
                    reqs += '- Include clear call-to-action or conclusion\n';
                    reqs += '- Proofread for grammar and spelling\n';
                    break;
                case 'video':
                    reqs += '- Plan clear visual storytelling with coherent narrative\n';
                    reqs += '- Ensure smooth transitions, pacing, and timing\n';
                    reqs += '- Maintain consistent mood and tone\n';
                    reqs += '- Use appropriate camera angles and shot types\n';
                    reqs += '- Sync audio and visuals effectively\n';
                    reqs += '- Optimize for the target platform\n';
                    break;
            }
            return reqs;
        }

        function formatPromptOutput(text) {
            const lines = text.split('\n');
            let html = '';
            let inList = false;
            
            for (let line of lines) {
                if (line.startsWith('## ')) {
                    if (inList) { html += '</ul>'; inList = false; }
                    const title = line.replace('## ', '');
                    html += `<div class="section"><div class="section-title">${title}</div>`;
                } else if (line.startsWith('- ')) {
                    if (!inList) { html += '<ul class="quality-list">'; inList = true; }
                    html += `<li>${line.replace('- ', '')}</li>`;
                } else if (line.trim() === '') {
                    if (inList) { html += '</ul></div>'; inList = false; }
                    else if (html.endsWith('</div>')) { html += '</div>'; }
                } else {
                    html += `<div class="section-content">${line || '<span class="placeholder">[Add details]</span>'}</div></div>`;
                }
            }
            if (inList) html += '</ul>';
            return html;
        }

        function copyPrompt() {
            const text = document.getElementById('prompt-output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.add('visible');
                setTimeout(() => status.classList.remove('visible'), 2000);
            });
        }

        function saveToHistory() {
            const text = document.getElementById('prompt-output').textContent;
            const summary = document.getElementById('objective').value.substring(0, 40) || 'Untitled';
            const entry = { 
                type: currentType, 
                summary: summary + (summary.length >= 40 ? '...' : ''),
                content: text,
                timestamp: Date.now()
            };
            promptHistory.unshift(entry);
            if (promptHistory.length > 10) promptHistory.pop();
            localStorage.setItem('foxxprompt_history', JSON.stringify(promptHistory));
            renderHistory();
            showToast('Prompt saved!');
        }

        function renderHistory() {
            const bar = document.getElementById('history-bar');
            if (promptHistory.length === 0) {
                bar.innerHTML = '<span class="history-empty">No recent prompts</span>';
                return;
            }
            bar.innerHTML = promptHistory.map((entry, i) => 
                `<div class="history-item" onclick="loadHistory(${i})">${entry.type} · ${entry.summary}</div>`
            ).join('');
        }

        function loadHistory(index) {
            const entry = promptHistory[index];
            selectType(entry.type);
            document.getElementById('prompt-output').textContent = entry.content;
            showToast('Loaded from history');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', generatePrompt);
        });

        updateFormLabels();
        renderHistory();
        generatePrompt();
    </script>
</body>
</html>
