<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 foxxprompt | AI Prompt Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #16161f;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.3);
            --accent-secondary: #ff9f35;
            --border: #2a2a35;
            --border-light: #3a3a45;
            --success: #35ff6b;
            --error: #ff3555;
            --mono-font: 'SF Mono', 'Fira Code', 'Monaco', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 16px; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255, 159, 53, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 480px;
            min-width: 480px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 28px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-sub {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .type-selector {
            display: flex;
            gap: 6px;
            background: var(--bg-tertiary);
            padding: 5px;
            border-radius: 10px;
        }

        .type-btn {
            flex: 1;
            padding: 10px 6px;
            background: transparent;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .type-btn:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .type-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .type-btn .icon { font-size: 1.1rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-light);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
            border-radius: 2px;
        }

        .quick-actions {
            display: flex;
            gap: 5px;
        }

        .quick-btn {
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-secondary);
            font-size: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .field-group {
            margin-bottom: 12px;
        }

        .field-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-primary);
            padding: 10px 12px;
            font-size: 0.75rem;
            font-family: inherit;
            transition: var(--transition);
            resize: vertical;
        }

        textarea {
            min-height: 50px;
            line-height: 1.5;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        .preset-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 6px;
        }

        .preset-chip {
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: var(--text-secondary);
            font-size: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .preset-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .preview-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: 7px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-success {
            color: var(--success);
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-success.visible { opacity: 1; }

        .prompt-output {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            font-family: var(--mono-font);
            font-size: 0.72rem;
            line-height: 1.65;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #e8e8f0;
        }

        .prompt-output .section {
            margin-bottom: 12px;
        }

        .prompt-output .section-title {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .prompt-output .section-title::before {
            content: '▸';
            color: var(--accent-secondary);
        }

        .prompt-output .section-content {
            color: var(--text-secondary);
            padding-left: 10px;
        }

        .prompt-output .quality-list {
            margin-top: 4px;
            padding-left: 10px;
        }

        .prompt-output .quality-list li {
            color: var(--text-muted);
            margin-bottom: 3px;
            font-size: 0.7rem;
        }

        .prompt-output .placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .prompt-output .role-block {
            background: rgba(255, 107, 53, 0.1);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0 6px 6px 0;
        }

        .prompt-output .step-block {
            background: rgba(53, 255, 107, 0.05);
            border-left: 3px solid var(--success);
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0 6px 6px 0;
        }

        .prompt-output .output-block {
            background: rgba(53, 150, 255, 0.1);
            border-left: 3px solid #3596ff;
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0 6px 6px 0;
        }

        .history-bar {
            display: flex;
            gap: 6px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 8px;
            overflow-x: auto;
            margin-top: auto;
        }

        .history-item {
            padding: 5px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 0.6rem;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .history-item:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .history-empty {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: center;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 18px;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mode-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 14px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-btn:hover {
            color: var(--text-primary);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .wizard-type-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }

        .wizard-type-btn {
            flex: 1;
            padding: 6px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .wizard-type-btn:hover {
            border-color: var(--accent);
        }

        .wizard-type-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .wizard-progress {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            padding: 8px;
            background: var(--bg-card);
            border-radius: 8px;
        }

        .wizard-progress-dot {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
            transition: var(--transition);
        }

        .wizard-progress-dot.completed {
            background: var(--success);
        }

        .wizard-progress-dot.current {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .wizard-step-area {
            flex: 1;
            overflow-y: auto;
        }

        .wizard-step-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            animation: fadeIn 0.3s ease-out;
        }

        .wizard-step-badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .wizard-question {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .wizard-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .wizard-input-area {
            margin-bottom: 20px;
        }

        .wizard-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .wizard-chip {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .wizard-chip:hover {
            border-color: var(--accent);
        }

        .wizard-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .wizard-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .wizard-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .wizard-btn-back {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .wizard-btn-back:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .wizard-btn-back:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .wizard-btn-next {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: white;
        }

        .wizard-btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .card { animation: fadeIn 0.4s ease-out; }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; min-width: 0; max-height: none; }
            .main { padding: 14px; }
            .prompt-output { min-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🦊</div>
                <div>
                    <div class="logo-text">foxxprompt</div>
                    <div class="logo-sub">AI Prompt Generator</div>
                </div>
            </div>

            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('quick')">
                    <span>⚡</span> Quick Form
                </button>
                <button class="mode-btn" onclick="setMode('wizard')">
                    <span>🪄</span> Wizard
                </button>
            </div>

            <div id="quick-form">
            <div class="type-selector">
                <button class="type-btn active" data-type="code" onclick="selectType('code')">
                    <span class="icon">💻</span>
                    <span>Code</span>
                </button>
                <button class="type-btn" data-type="image" onclick="selectType('image')">
                    <span class="icon">🎨</span>
                    <span>Image</span>
                </button>
                <button class="type-btn" data-type="writing" onclick="selectType('writing')">
                    <span class="icon">✍</span>
                    <span>Write</span>
                </button>
                <button class="type-btn" data-type="video" onclick="selectType('video')">
                    <span class="icon">🎬</span>
                    <span>Video</span>
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Role & Objective</div>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="loadExample()">Example</button>
                        <button class="quick-btn" onclick="clearForm()">Clear</button>
                    </div>
                </div>
                <div class="field-group">
                    <label id="label-role">🎭 AI Role</label>
                    <input type="text" id="role" placeholder="e.g., Senior Frontend Developer, DevOps Engineer...">
                    <div class="preset-chips" id="role-presets"></div>
                </div>
                <div class="field-group">
                    <label id="label-objective">🎯 Objective</label>
                    <textarea id="objective" placeholder="What exactly should the AI produce? Be specific about the end result."></textarea>
                </div>
                <div class="field-group">
                    <label id="label-context">🔧 Context & Background</label>
                    <textarea id="context" placeholder="Existing code, project background, constraints, relevant files..."></textarea>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title" id="details-title">Implementation Details</div>
                </div>
                <div class="field-group" id="field-style">
                    <label id="label-style">Tech Stack / Tools</label>
                    <input type="text" id="style" placeholder="Frameworks, languages, libraries...">
                    <div class="preset-chips" id="style-presets"></div>
                </div>
                <div class="field-group" id="field-steps">
                    <label>📝 Steps / Process</label>
                    <textarea id="steps" placeholder="Step-by-step instructions for how to approach the task..."></textarea>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Output & Quality</div>
                </div>
                <div class="field-group">
                    <label>📐 Output Format</label>
                    <input type="text" id="format" placeholder="e.g., single file, full project, API endpoint...">
                    <div class="preset-chips" id="format-presets"></div>
                </div>
                <div class="field-group">
                    <label>⚡ Reasoning Approach</label>
                    <select id="reasoning">
                        <option value="">Select approach...</option>
                        <option value="think-step">Think step-by-step - Show your reasoning</option>
                        <option value="analytical">Analytical - Break down the problem systematically</option>
                        <option value="creative">Creative - Explore multiple solutions, pick best</option>
                        <option value="cautious">Cautious - Verify each step before proceeding</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>🎭 Tone</label>
                    <select id="tone">
                        <option value="">Select tone...</option>
                        <option value="professional">Professional - Clean, formal, business-ready</option>
                        <option value="casual">Casual - Friendly, relaxed, conversational</option>
                        <option value="technical">Technical - Detailed, precise, expert-level</option>
                        <option value="educational">Educational - Clear, instructive, learning-focused</option>
                        <option value="creative">Creative - Bold, imaginative, innovative</option>
                        <option value="minimal">Minimal - Concise, efficient, no-nonsense</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>⚠️ Constraints (What to AVOID)</label>
                    <input type="text" id="constraints" placeholder="Elements, approaches, or styles to avoid...">
                </div>
                <div class="field-group">
                    <label>💥 Edge Cases</label>
                    <textarea id="edge-cases" placeholder="How to handle errors, missing data, edge cases..."></textarea>
                </div>
            </div>

            <div class="history-bar" id="history-bar">
                <span class="history-empty">No recent prompts</span>
            </div>
            </div>

            <div id="wizard-container" style="display: none;"></div>
        </aside>

        <main class="main">
            <div class="preview-header">
                <div class="preview-title">
                    <span style="color: var(--accent);">✦</span> Generated Prompt
                </div>
                <div class="preview-actions">
                    <span id="copy-status" class="copy-success">✓ Copied!</span>
                    <button class="btn btn-secondary" onclick="copyPrompt()">
                        <span>📋</span> Copy
                    </button>
                    <button class="btn btn-primary" onclick="saveToHistory()">
                        <span>💾</span> Save
                    </button>
                </div>
            </div>
            <div class="prompt-output" id="prompt-output"></div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentType = 'code';
        let promptHistory = JSON.parse(localStorage.getItem('foxxprompt_history') || '[]');
        let currentMode = sessionStorage.getItem('foxxprompt_mode') || 'quick';

        const wizardState = {
            currentStep: 1,
            answers: {}
        };

        function setMode(mode) {
            currentMode = mode;
            sessionStorage.setItem('foxxprompt_mode', mode);
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(mode));
            });
            document.getElementById('quick-form').style.display = mode === 'quick' ? 'block' : 'none';
            document.getElementById('wizard-container').style.display = mode === 'wizard' ? 'block' : 'none';
            
            if (mode === 'wizard') {
                initWizard();
            } else {
                sessionStorage.removeItem('foxxprompt_wizard');
                wizardState.currentStep = 1;
                wizardState.answers = {};
            }
        }

        const wizardSteps = {
            code: [

        function initWizard() {
            const saved = sessionStorage.getItem('foxxprompt_wizard');
            if (saved) {
                const parsed = JSON.parse(saved);
                wizardState.currentStep = parsed.currentStep || 1;
                wizardState.answers = parsed.answers || {};
            }
            
            const container = document.getElementById('wizard-container');
            const steps = wizardSteps[currentType];
            
            const typeSelectorHTML = `
                <div class="wizard-type-selector">
                    ${['code', 'image', 'writing', 'video'].map(t => `
                        <button class="wizard-type-btn ${t === currentType ? 'active' : ''}" onclick="switchWizardType('${t}')">${t === 'code' ? '💻' : t === 'image' ? '🎨' : t === 'writing' ? '✍' : '🎬'} ${t.charAt(0).toUpperCase() + t.slice(1)}</button>
                    `).join('')}
                </div>
            `;
            const progressHTML = `<div class="wizard-progress"></div>`;
            
            container.innerHTML = typeSelectorHTML + progressHTML + '<div class="wizard-step-area"></div>';
            
            renderWizardStep();
            updateProgressBar();
        }

        function renderWizardStep() {
            const steps = wizardSteps[currentType];
            const step = steps[wizardState.currentStep - 1];
            const stepArea = document.querySelector('.wizard-step-area');
            if (!stepArea) return;
            
            const currentValue = wizardState.answers[step.id] || step.default || '';
            
            let inputHTML = '';
            switch(step.type) {
                case 'text':
                    inputHTML = `<textarea id="wizard-input" placeholder="${step.placeholder || ''}" rows="3">${currentValue}</textarea>`;
                    break;
                case 'select':
                    inputHTML = `<select id="wizard-input">${step.options.map(o => `<option value="${o}" ${o === currentValue ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
                    break;
                case 'chips':
                    const selectedChips = wizardState.answers[step.id] || [];
                    inputHTML = `<div class="wizard-chips">${(step.chips || []).map(c => `<span class="wizard-chip ${selectedChips.includes(c) ? 'active' : ''}" onclick="toggleChip('${step.id}', '${c}')">${c}</span>`).join('')}</div>`;
                    break;
                case 'chips-multi':
                    const selectedMulti = wizardState.answers[step.id] || [];
                    inputHTML = `<div class="wizard-chips">${(step.chips || []).map(c => `<span class="wizard-chip ${selectedMulti.includes(c) ? 'active' : ''}" onclick="toggleChipMulti('${step.id}', '${c}')">${c}</span>`).join('')}</div>`;
                    break;
            }
            
            stepArea.innerHTML = `
                <div class="wizard-step-card">
                    <div class="wizard-step-badge">Step ${wizardState.currentStep} of ${steps.length}</div>
                    <h3 class="wizard-question">${step.label}</h3>
                    <p class="wizard-subtitle">${step.required ? 'Required' : 'Optional'}</p>
                    <div class="wizard-input-area">${inputHTML}</div>
                    <div class="wizard-nav">
                        <button class="wizard-btn wizard-btn-back" onclick="wizardBack()" ${wizardState.currentStep === 1 ? 'disabled' : ''}>← Back</button>
                        <button class="wizard-btn wizard-btn-next" onclick="wizardNext()">${wizardState.currentStep === steps.length ? 'Finish ✨' : 'Next →'}</button>
                    </div>
                </div>
            `;
        }

        function wizardNext() {
            const step = wizardSteps[currentType][wizardState.currentStep - 1];
            const input = document.getElementById('wizard-input');
            
            if (step.required && step.type !== 'chips' && step.type !== 'chips-multi') {
                if (!input || !input.value.trim()) {
                    showToast('Please fill in this field');
                    return;
                }
            }
            
            if (step.type === 'chips' || step.type === 'chips-multi') {
                if (!wizardState.answers[step.id] || wizardState.answers[step.id].length === 0) {
                    wizardState.answers[step.id] = step.default ? [step.default] : [];
                }
            } else if (input) {
                wizardState.answers[step.id] = input.value;
            }
            
            saveWizardState();
            
            if (wizardState.currentStep < wizardSteps[currentType].length) {
                wizardState.currentStep++;
                renderWizardStep();
            } else {
                generateWizardPrompt();
            }
            updateProgressBar();
        }

        function wizardBack() {
            if (wizardState.currentStep > 1) {
                wizardState.currentStep--;
                saveWizardState();
                renderWizardStep();
                updateProgressBar();
            }
        }

        function toggleChip(fieldId, value) {
            if (!wizardState.answers[fieldId]) wizardState.answers[fieldId] = [];
            if (wizardState.answers[fieldId].includes(value)) {
                wizardState.answers[fieldId] = wizardState.answers[fieldId].filter(v => v !== value);
            } else {
                wizardState.answers[fieldId].push(value);
            }
            renderWizardStep();
        }

        function toggleChipMulti(fieldId, value) {
            toggleChip(fieldId, value);
        }

        function saveWizardState() {
            sessionStorage.setItem('foxxprompt_wizard', JSON.stringify({
                currentStep: wizardState.currentStep,
                answers: wizardState.answers
            }));
        }

        function switchWizardType(type) {
            currentType = type;
            wizardState.currentStep = 1;
            wizardState.answers = {};
            sessionStorage.removeItem('foxxprompt_wizard');
            
            document.querySelectorAll('.wizard-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(type));
            });
            
            initWizard();
            showToast(`Switched to ${type} wizard`);
        }

        function updateProgressBar() {
            const steps = wizardSteps[currentType];
            const container = document.querySelector('.wizard-progress');
            if (!container) return;
            
            container.innerHTML = steps.map((_, i) => `
                <div class="wizard-progress-dot ${i + 1 < wizardState.currentStep ? 'completed' : ''} ${i + 1 === wizardState.currentStep ? 'current' : ''}" onclick="jumpToStep(${i + 1})"></div>
            `).join('');
        }

        function jumpToStep(step) {
            wizardState.currentStep = step;
            saveWizardState();
            renderWizardStep();
            updateProgressBar();
        }

            document.getElementById('tone').value = ex.tone;
            document.getElementById('constraints').value = ex.constraints;
            document.getElementById('edge-cases').value = ex.edgeCases;
            generatePrompt();
        }

        function clearForm() {
            ['role', 'objective', 'context', 'style', 'steps', 'format', 'reasoning', 'tone', 'constraints', 'edge-cases'].forEach(id => {
                document.getElementById(id).value = '';
            });
            generatePrompt();
        }

        function getValue(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : '';
        }

        function generatePrompt() {
            const role = getValue('role');
            const objective = getValue('objective');
            const context = getValue('context');
            const style = getValue('style');
            const steps = getValue('steps');
            const format = getValue('format');
            const reasoning = getValue('reasoning');
            const tone = getValue('tone');
            const constraints = getValue('constraints');
            const edgeCases = getValue('edge-cases');

            const typeLabels = { code: 'Code Development', image: 'Image Generation', writing: 'Writing', video: 'Video Production' };

            let prompt = `═══════════════════════════════════════════════════════════════\n`;
            prompt += `TASK TYPE: ${typeLabels[currentType].toUpperCase()}\n`;
            prompt += `═══════════════════════════════════════════════════════════════\n\n`;

            prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            prompt += `🎭 ROLE\n`;
            prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            if (role) {
                prompt += `You are a ${role}.\n`;
            } else {
                prompt += `[Define your role - e.g., Senior Developer, Expert Designer]\n`;
            }
            prompt += `\n`;

            prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            prompt += `🎯 OBJECTIVE\n`;
            prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            prompt += `${objective || '[Describe what you want to achieve - be specific]'}\n\n`;

            if (context) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `📋 CONTEXT\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `${context}\n\n`;
            }

            if (style) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                switch(currentType) {
                    case 'code': prompt += `💻 TECH STACK\n`; break;
                    case 'image': prompt += `🎨 ART STYLE\n`; break;
                    case 'writing': prompt += `📝 CONTENT STYLE\n`; break;
                    case 'video': prompt += `🎬 PRODUCTION STYLE\n`; break;
                }
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `${style}\n\n`;
            }

            if (steps) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `📝 STEPS / PROCESS\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `${steps}\n\n`;
            }

            if (format) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `📐 OUTPUT FORMAT\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `${format}\n\n`;
            }

            if (reasoning) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `🧠 REASONING APPROACH\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                const reasoningGuides = {
                    'think-step': 'Think step-by-step. Show your reasoning process and explain each step as you work toward the solution.',
                    'analytical': 'Break down the problem systematically. Analyze all components, consider trade-offs, and provide data-driven decisions.',
                    'creative': 'Explore multiple approaches and solutions. Be imaginative and innovative - consider the best solution from various angles.',
                    'cautious': 'Verify each step before proceeding. Double-check your work, consider edge cases, and ensure accuracy at each stage.'
                };
                prompt += `${reasoningGuides[reasoning] || ''}\n\n`;
            }

            if (tone) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `🎭 TONE & STYLE\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                const toneGuides = {
                    professional: 'Use clean, formal, business-appropriate language. Be precise and accurate.',
                    casual: 'Use friendly, relaxed, conversational language. Be approachable and natural.',
                    technical: 'Use detailed, precise, expert-level language. Include technical specifics and nuances.',
                    educational: 'Use clear, instructive language. Explain concepts thoroughly and guide the reader.',
                    creative: 'Use bold, imaginative, innovative language. Be expressive and engaging.',
                    minimal: 'Use concise, efficient language. Remove unnecessary words, get to the point.'
                };
                prompt += `${toneGuides[tone] || ''}\n\n`;
            }

            if (constraints) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `⚠️ CONSTRAINTS (AVOID)\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `${constraints}\n\n`;
            }

            if (edgeCases) {
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `💥 EDGE CASES & ERROR HANDLING\n`;
                prompt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                prompt += `${edgeCases}\n\n`;
            }

            prompt += generateQualityRequirements();

            prompt += `\n═══════════════════════════════════════════════════════════════\n`;
            prompt += `END OF PROMPT\n`;
            prompt += `═══════════════════════════════════════════════════════════════`;

            document.getElementById('prompt-output').textContent = prompt;
        }

        function generateQualityRequirements() {
            let reqs = `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            reqs += `✅ QUALITY REQUIREMENTS\n`;
            reqs += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;

            switch(currentType) {
                case 'code':
                    reqs += `• Write clean, modular, production-ready code\n`;
                    reqs += `• Include comprehensive comments and JSDoc documentation\n`;
                    reqs += `• Implement proper error handling with try-catch where needed\n`;
                    reqs += `• Follow security best practices (input validation, no hardcoded secrets)\n`;
                    reqs += `• Optimize for performance where applicable\n`;
                    reqs += `• Use modern language features and best practices\n`;
                    reqs += `• Include unit tests or describe testing approach\n`;
                    reqs += `• Ensure code is complete and runnable without modifications\n`;
                    break;
                case 'image':
                    reqs += `• Create balanced, visually compelling composition\n`;
                    reqs += `• Ensure proper lighting, shadows, and depth\n`;
                    reqs += `• Pay attention to details, textures, and materials\n`;
                    reqs += `• Maintain consistent style throughout\n`;
                    reqs += `• Deliver high-resolution, detailed output\n`;
                    reqs += `• Avoid artifacts, distortions, or visual errors\n`;
                    reqs += `• Ensure proper color grading and saturation\n`;
                    reqs += `• Create professional-quality, usable result\n`;
                    break;
                case 'writing':
                    reqs += `• Write engaging, well-structured content\n`;
                    reqs += `• Ensure clarity, coherence, and logical flow\n`;
                    reqs += `• Use appropriate vocabulary for the target audience\n`;
                    reqs += `• Maintain consistent tone throughout\n`;
                    reqs += `• Include clear structure with headings where appropriate\n`;
                    reqs += `• Include clear call-to-action or conclusion\n`;
                    reqs += `• Proofread for grammar, spelling, and punctuation\n`;
                    reqs += `• Deliver polished, publication-ready text\n`;
                    break;
                case 'video':
                    reqs += `• Plan clear visual storytelling with coherent narrative\n`;
                    reqs += `• Ensure smooth transitions, pacing, and timing\n`;
                    reqs += `• Maintain consistent mood and tone throughout\n`;
                    reqs += `• Use appropriate camera angles and shot types\n`;
                    reqs += `• Sync audio and visuals effectively\n`;
                    reqs += `• Optimize for the target platform and audience\n`;
                    reqs += `• Deliver professional, production-ready output\n`;
                    reqs += `• Include proper encoding and format specifications\n`;
                    break;
            }
            return reqs;
        }

        function copyPrompt() {
            const text = document.getElementById('prompt-output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.add('visible');
                setTimeout(() => status.classList.remove('visible'), 2000);
            });
        }

        function saveToHistory() {
            const text = document.getElementById('prompt-output').textContent;
            const summary = getValue('objective').substring(0, 35) || getValue('role') || 'Untitled';
            const entry = { 
                type: currentType, 
                summary: summary + (summary.length >= 35 ? '...' : ''),
                content: text,
                timestamp: Date.now()
            };
            promptHistory.unshift(entry);
            if (promptHistory.length > 10) promptHistory.pop();
            localStorage.setItem('foxxprompt_history', JSON.stringify(promptHistory));
            renderHistory();
            showToast('Prompt saved!');
        }

        function renderHistory() {
            const bar = document.getElementById('history-bar');
            if (promptHistory.length === 0) {
                bar.innerHTML = '<span class="history-empty">No recent prompts</span>';
                return;
            }
            bar.innerHTML = promptHistory.map((entry, i) => 
                `<div class="history-item" onclick="loadHistory(${i})">${entry.type} · ${entry.summary}</div>`
            ).join('');
        }

        function loadHistory(index) {
            const entry = promptHistory[index];
            selectType(entry.type);
            document.getElementById('prompt-output').textContent = entry.content;
            showToast('Loaded from history');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', generatePrompt);
        });

        updateFormLabels();
        renderHistory();
        generatePrompt();

        // Initialize mode on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedMode = sessionStorage.getItem('foxxprompt_mode') || 'quick';
            if (savedMode === 'wizard') {
                setMode('wizard');
            }
        });
    </script>
</body>
</html>
