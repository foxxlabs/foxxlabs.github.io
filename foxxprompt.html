<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 foxxprompt | Advanced CLI Prompt Architect</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #ff8c00;
            --accent-hover: #ff9f2e;
            --border-color: #3e2723;
            --input-bg: #0d1117;
            --button-hover: #e67e22;
            --mono-font: 'Fira Code', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 500px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        h1 {
            font-size: 1.6rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
        }

        h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: #ffb74d;
            margin-bottom: 12px;
            margin-top: 15px;
            border-left: 3px solid var(--accent-color);
            padding-left: 8px;
        }

        .field-group { margin-bottom: 12px; }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-weight: 600;
            color: #d1d5db;
        }

        input[type="text"], textarea, select {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 10px 12px;
            font-size: 0.85rem;
            font-family: var(--mono-font);
        }

        textarea { resize: vertical; min-height: 60px; }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #prompt-output {
            flex: 1;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            font-family: var(--mono-font);
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
            color: #e6edf3;
        }

        .btn {
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }

        .btn-copy {
            background-color: #2c1e14;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-copy:hover { background-color: #3e2723; }

        .copy-success {
            color: #ffb74d;
            font-size: 0.8rem;
            margin-right: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-success.visible { opacity: 1; }

        section { padding-bottom: 10px; border-bottom: 1px solid #2c1e14; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1>🦊 foxxprompt</h1>

        <section>
            <h2>🎯 WHAT SHOULD THIS APP DO?</h2>
            <div class="field-group">
                <label for="app_purpose">Main purpose of this app</label>
                <textarea id="app_purpose" placeholder="What does this app do? What problem does it solve?"></textarea>
            </div>
            <div class="field-group">
                <label for="user_actions">What can users do?</label>
                <textarea id="user_actions" placeholder="Create, read, update, delete? Search? Export? Submit forms?"></textarea>
            </div>
            <div class="field-group">
                <label for="example_usage">Example: A user opens the app and...</label>
                <textarea id="example_usage" placeholder="Step by step: User does X → sees Y → gets result Z"></textarea>
            </div>
        </section>

        <section>
            <h2>📋 PROJECT</h2>
            <div class="field-group">
                <label for="project_name">Project Name</label>
                <input type="text" id="project_name" placeholder="My Awesome App">
            </div>
            <div class="field-group">
                <label for="project_type">Project Type</label>
                <select id="project_type">
                    <option value="">Select type...</option>
                    <option value="new">New Project</option>
                    <option value="feature">Add Feature</option>
                    <option value="bugfix">Bug Fix</option>
                    <option value="refactor">Refactor</option>
                    <option value="api">API</option>
                    <option value="cli">CLI Tool</option>
                </select>
            </div>
            <div class="field-group">
                <label for="failure_state">Current Problem (if bug)</label>
                <textarea id="failure_state" placeholder="Describe the error or incorrect behavior"></textarea>
            </div>
        </section>

        <section>
            <h2>✨ FEATURES</h2>
            <div class="field-group">
                <label for="core_features">Must-have features</label>
                <textarea id="core_features" placeholder="List essential features"></textarea>
            </div>
            <div class="field-group">
                <label for="nice_to_have">Nice-to-have (if time permits)</label>
                <textarea id="nice_to_have" placeholder="Extra features that would be great"></textarea>
            </div>
            <div class="field-group">
                <label for="edge_cases">What could go wrong?</label>
                <textarea id="edge_cases" placeholder="Error states, empty data, invalid input, network issues"></textarea>
            </div>
        </section>

        <section>
            <h2>🛠 TECHNICAL</h2>
            <div class="field-group">
                <label for="stack">Tech Stack</label>
                <input type="text" id="stack" placeholder="e.g., React, Node.js, PostgreSQL">
            </div>
            <div class="field-group">
                <label for="files">Files to modify</label>
                <textarea id="files" placeholder="Which files should be changed?"></textarea>
            </div>
            <div class="field-group">
                <label for="conventions">Code style</label>
                <input type="text" id="conventions" placeholder="e.g., TypeScript strict, PEP8">
            </div>
        </section>

        <section>
            <h2>✅ VERIFY</h2>
            <div class="field-group">
                <label for="testing">How to test?</label>
                <input type="text" id="testing" placeholder="e.g., Run pytest, npm test">
            </div>
        </section>
    </aside>

    <main class="main">
        <div class="preview-header">
            <h2>🦊 Generated Prompt</h2>
            <div style="display: flex; align-items: center;">
                <span id="copy-status" class="copy-success">Copied!</span>
                <button class="btn btn-copy" onclick="copyPrompt()">Copy</button>
            </div>
        </div>
        <div id="prompt-output"></div>
    </main>

    <script>
        const inputs = [
            'app_purpose', 'user_actions', 'example_usage',
            'project_name', 'project_type', 'failure_state',
            'core_features', 'nice_to_have', 'edge_cases', 'stack', 'files', 'conventions', 'testing'
        ];
        
        const output = document.getElementById('prompt-output');

        function generatePrompt() {
            const data = {};
            inputs.forEach(id => {
                const el = document.getElementById(id);
                data[id] = el ? el.value.trim() : '';
            });

            let prompt = `# 🎯 WHAT SHOULD THIS APP DO?\n`;
            prompt += `## Purpose\n${data.app_purpose || '[Describe what the app should do]'}\n\n`;
            prompt += `## User Actions\n${data.user_actions || '[What can users do with this app]'}\n\n`;
            prompt += `## Usage Example\n${data.example_usage || '[Walk through a user scenario]'}\n\n`;

            prompt += `# 📋 PROJECT\n`;
            prompt += `- **Name:** ${data.project_name || 'N/A'}\n`;
            prompt += `- **Type:** ${data.project_type || 'N/A'}\n`;
            if (data.failure_state) {
                prompt += `## Current Problem\n${data.failure_state}\n\n`;
            }

            prompt += `# ✨ FEATURES\n`;
            prompt += `## Must Have\n${data.core_features || '[List core features]'}\n\n`;
            prompt += `## Nice to Have\n${data.nice_to_have || 'N/A'}\n\n`;
            prompt += `## Edge Cases\n${data.edge_cases || 'N/A'}\n\n`;

            prompt += `# 🛠 TECHNICAL\n`;
            prompt += `- **Tech Stack:** ${data.stack || 'N/A'}\n`;
            prompt += `- **Files:** ${data.files || 'N/A'}\n`;
            prompt += `- **Code Style:** ${data.conventions || 'Follow existing patterns'}\n\n`;

            prompt += `# ✅ VERIFY\n`;
            prompt += `${data.testing || 'Test the implementation'}\n\n`;

            prompt += `# 🦊 INSTRUCTIONS\n`;
            prompt += `1. Understand the goal and behavior\n`;
            prompt += `2. Plan the implementation\n`;
            prompt += `3. Implement with care\n`;
            prompt += `4. Verify it works`;

            output.textContent = prompt;
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', generatePrompt);
        });

        function copyPrompt() {
            navigator.clipboard.writeText(output.textContent).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.add('visible');
                setTimeout(() => status.classList.remove('visible'), 2000);
            });
        }

        generatePrompt();
    </script>
</body>
</html>
