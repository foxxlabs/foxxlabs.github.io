<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 foxxprompt | AI Prompt Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦊</text></svg>">
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #ff8c00;
            --accent-hover: #ff9f2e;
            --border-color: #3e2723;
            --input-bg: #0d1117;
            --mono-font: 'Fira Code', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 500px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
        }

        h2 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            color: #ffb74d;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent-color);
            padding-left: 8px;
        }

        .field-group { margin-bottom: 8px; }

        label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 3px;
            font-weight: 600;
            color: #d1d5db;
        }

        input[type="text"], textarea, select {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 8px 10px;
            font-size: 0.75rem;
            font-family: var(--mono-font);
        }

        textarea { resize: vertical; min-height: 45px; }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2);
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .type-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .type-btn:hover { border-color: var(--accent-color); }

        .type-btn.active {
            background-color: #2c1e14;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .type-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }
        .type-btn .label { font-size: 0.65rem; font-weight: 600; }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        #prompt-output {
            flex: 1;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px;
            font-family: var(--mono-font);
            font-size: 0.75rem;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            color: #e6edf3;
        }

        .btn {
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }

        .btn-copy {
            background-color: #2c1e14;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-copy:hover { background-color: #3e2723; }

        .copy-success {
            color: #ffb74d;
            font-size: 0.7rem;
            margin-right: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-success.visible { opacity: 1; }

        section { padding-bottom: 6px; border-bottom: 1px solid #2c1e14; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1>🦊 foxxprompt</h1>

        <div class="type-selector">
            <div class="type-btn active" data-type="code" onclick="selectType('code')">
                <span class="icon">💻</span>
                <span class="label">Code</span>
            </div>
            <div class="type-btn" data-type="image" onclick="selectType('image')">
                <span class="icon">🎨</span>
                <span class="label">Image</span>
            </div>
            <div class="type-btn" data-type="writing" onclick="selectType('writing')">
                <span class="icon">✍</span>
                <span class="label">Writing</span>
            </div>
            <div class="type-btn" data-type="video" onclick="selectType('video')">
                <span class="icon">🎬</span>
                <span class="label">Video</span>
            </div>
        </div>

        <section id="section-core">
            <h2>🎯 Core Concept</h2>
            <div class="field-group">
                <label for="main_idea">What do you want to create?</label>
                <textarea id="main_idea" placeholder="Describe your idea in detail - what, why, and how it should work"></textarea>
            </div>
            <div class="field-group">
                <label for="problem">Problem or Need</label>
                <textarea id="problem" placeholder="What problem does this solve? Who is it for?"></textarea>
            </div>
        </section>

        <section id="section-details">
            <h2 id="details-title">📋 Technical Details</h2>
            <div class="field-group" id="field-style">
                <label for="style">Tech Stack / Framework</label>
                <input type="text" id="style" placeholder="e.g., React, Node.js, TypeScript, PostgreSQL">
            </div>
            <div class="field-group" id="field-requirements">
                <label for="requirements">Features & Functionality</label>
                <textarea id="requirements" placeholder="Key features, user interactions, data handling"></textarea>
            </div>
            <div class="field-group" id="field-audience">
                <label for="audience">Target Audience</label>
                <input type="text" id="audience" placeholder="Who will use this? What skill level?">
            </div>
        </section>

        <section id="section-context">
            <h2>🔧 Implementation</h2>
            <div class="field-group" id="field-context">
                <label for="context">Existing Code / References</label>
                <textarea id="context" placeholder="Files to modify, existing codebase patterns, libraries to use">
</textarea>
            </div>
            <div class="field-group" id="field-format">
                <label for="format">Output Format</label>
                <input type="text" id="format" placeholder="e.g., single file, full project, API endpoint">
            </div>
            <div class="field-group" id="field-constraints">
                <label for="constraints">Constraints / Requirements</label>
                <input type="text" id="constraints" placeholder="Performance, browser support, deadlines">
            </div>
            <div class="field-group" id="field-testing">
                <label for="testing">Testing & Verification</label>
                <input type="text" id="testing" placeholder="How to test: e.g., unit tests, manual check">
            </div>
            <div class="field-group" id="field-structure">
                <label for="structure">File Structure</label>
                <textarea id="structure" placeholder="Specific files to create/modify, folder layout"></textarea>
            </div>
        </section>

    </aside>

    <main class="main">
        <div class="preview-header">
            <h2 style="border: none; padding: 0; font-size: 1rem; color: var(--accent-color);">🦊 Generated Prompt</h2>
            <div style="display: flex; align-items: center;">
                <span id="copy-status" class="copy-success">Copied!</span>
                <button class="btn btn-copy" onclick="copyPrompt()">Copy</button>
            </div>
        </div>
        <div id="prompt-output"></div>
    </main>

    <script>
        let currentType = 'code';

        const inputs = ['main_idea', 'problem', 'style', 'requirements', 'audience', 'context', 'format', 'constraints', 'testing', 'structure'];

        const typeConfig = {
            code: {
                detailsTitle: '📋 Technical Details',
                styleLabel: 'Tech Stack / Framework',
                stylePlaceholder: 'e.g., React, Node.js, TypeScript, PostgreSQL',
                requirementsLabel: 'Features & Functionality',
                requirementsPlaceholder: 'Key features, user interactions, data handling',
                contextLabel: 'Existing Code / References',
                contextPlaceholder: 'Files to modify, codebase patterns, libraries to use',
                formatLabel: 'Output Format',
                formatPlaceholder: 'e.g., single file, full project, API endpoint',
                constraintsLabel: 'Constraints / Requirements',
                constraintsPlaceholder: 'Performance needs, browser support, deadlines',
                extra1Label: 'Testing & Verification',
                extra1Placeholder: 'How to test: e.g., unit tests, manual check',
                extra2Label: 'File Structure',
                extra2Placeholder: 'Specific files to create/modify, folder layout'
            },
            image: {
                detailsTitle: '🎨 Visual Details',
                styleLabel: 'Art Style / Medium',
                stylePlaceholder: 'e.g., photorealistic, oil painting, anime, 3D render',
                requirementsLabel: 'Key Elements & Composition',
                requirementsPlaceholder: 'Subjects, objects, atmosphere, lighting',
                contextLabel: 'Color & Mood',
                contextPlaceholder: 'Color palette, mood, emotional tone, reference artists',
                formatLabel: 'Dimensions / Format',
                formatPlaceholder: 'e.g., 1920x1080, square, portrait, landscape',
                constraintsLabel: 'Style Constraints',
                constraintsPlaceholder: 'Avoid elements, specific techniques',
                extra1Label: 'Lighting',
                extra1Placeholder: 'e.g., natural, studio, dramatic, soft, backlit',
                extra2Label: 'Reference Images',
                extra2Placeholder: 'Links or descriptions of reference images'
            },
            writing: {
                detailsTitle: '✍ Content Details',
                styleLabel: 'Tone / Voice',
                stylePlaceholder: 'e.g., formal, casual, humorous, persuasive, academic',
                requirementsLabel: 'Key Points & Structure',
                requirementsPlaceholder: 'Main topics, arguments, sections to include',
                contextLabel: 'Audience & Context',
                contextPlaceholder: 'Reader knowledge level, publication context',
                formatLabel: 'Format / Length',
                formatPlaceholder: 'e.g., blog post, 1000 words, technical docs',
                constraintsLabel: 'Writing Constraints',
                constraintsPlaceholder: 'Avoid certain phrases, SEO keywords, style rules',
                extra1Label: 'Deadline / Urgency',
                extra1Placeholder: 'When needed, priority level',
                extra2Label: 'SEO / Keywords',
                extra2Placeholder: 'Keywords to include, search terms'
            },
            video: {
                detailsTitle: '🎬 Production Details',
                styleLabel: 'Visual Style / Mood',
                stylePlaceholder: 'e.g., cinematic, documentary, animated, vlog',
                requirementsLabel: 'Key Scenes / Shots',
                requirementsPlaceholder: 'Scenes, transitions, specific shots needed',
                contextLabel: 'Audio & Music',
                contextPlaceholder: 'Background music, voiceover, sound effects',
                formatLabel: 'Resolution / Aspect',
                formatPlaceholder: 'e.g., 4K, 1080p, 16:9, 9:16, 60fps',
                constraintsLabel: 'Production Constraints',
                constraintsPlaceholder: 'Budget, length, animation style',
                extra1Label: 'Duration',
                extra1Placeholder: 'e.g., 30 seconds, 5 minutes, full episode',
                extra2Label: 'Characters / Subjects',
                extra2Placeholder: 'Who or what appears on screen'
            }
        };

        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            const config = typeConfig[type];
            document.getElementById('details-title').textContent = config.detailsTitle;
            document.querySelector('#field-style label').textContent = config.styleLabel;
            document.getElementById('style').placeholder = config.stylePlaceholder;
            document.querySelector('#field-requirements label').textContent = config.requirementsLabel;
            document.getElementById('requirements').placeholder = config.requirementsPlaceholder;
            document.querySelector('#field-context label').textContent = config.contextLabel;
            document.getElementById('context').placeholder = config.contextPlaceholder;
            document.querySelector('#field-format label').textContent = config.formatLabel;
            document.getElementById('format').placeholder = config.formatPlaceholder;
            document.querySelector('#field-constraints label').textContent = config.constraintsLabel;
            document.getElementById('constraints').placeholder = config.constraintsPlaceholder;
            document.querySelector('#field-testing label').textContent = config.extra1Label;
            document.getElementById('testing').placeholder = config.extra1Placeholder;
            document.querySelector('#field-structure label').textContent = config.extra2Label;
            document.getElementById('structure').placeholder = config.extra2Placeholder;
            generatePrompt();
        }

        function getValue(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : '';
        }

        function generatePrompt() {
            const mainIdea = getValue('main_idea');
            const problem = getValue('problem');
            const style = getValue('style');
            const requirements = getValue('requirements');
            const audience = getValue('audience');
            const context = getValue('context');
            const format = getValue('format');
            const constraints = getValue('constraints');
            const testing = getValue('testing');
            const structure = getValue('structure');

            const typeLabels = {
                code: '💻 Code Development',
                image: '🎨 Image Generation',
                writing: '✍ Writing',
                video: '🎬 Video Production'
            };

            let prompt = `# ${typeLabels[currentType]} Prompt\n\n`;
            
            prompt += `## 🎯 Core Concept\n`;
            prompt += `${mainIdea || '[Describe what you want to create]'}\n\n`;

            if (problem) {
                prompt += `## ❓ Problem Solved\n${problem}\n\n`;
            }

            if (requirements) {
                prompt += `## 📦 Requirements\n${requirements}\n\n`;
            }

            if (style) {
                if (currentType === 'code') {
                    prompt += `## 🛠 Tech Stack\n${style}\n\n`;
                } else if (currentType === 'image') {
                    prompt += `## 🎨 Art Style\n${style}\n\n`;
                } else if (currentType === 'writing') {
                    prompt += `## 🎭 Tone & Voice\n${style}\n\n`;
                } else if (currentType === 'video') {
                    prompt += `## 🎬 Visual Style\n${style}\n\n`;
                }
            }

            if (format) {
                prompt += `## 📐 Output Format\n${format}\n\n`;
            }

            if (audience) {
                prompt += `## 👥 Target Audience\n${audience}\n\n`;
            }

            if (context) {
                prompt += `## 📚 Context & References\n${context}\n\n`;
            }

            if (constraints) {
                prompt += `## ⚠ Constraints\n${constraints}\n\n`;
            }

            if (testing) {
                if (currentType === 'code') {
                    prompt += `## 🧪 Testing & Verification\n${testing}\n\n`;
                }
            }

            if (structure) {
                if (currentType === 'code') {
                    prompt += `## 📁 File Structure\n${structure}\n\n`;
                }
            }

            if (currentType === 'image') {
                const lighting = getValue('testing');
                const references = getValue('structure');
                if (lighting) prompt += `## 💡 Lighting\n${lighting}\n\n`;
                if (references) prompt += `## 🖼 Reference Images\n${references}\n\n`;
            }

            if (currentType === 'writing') {
                const deadline = getValue('testing');
                const seo = getValue('structure');
                if (deadline) prompt += `## ⏰ Deadline\n${deadline}\n\n`;
                if (seo) prompt += `## 🔍 SEO / Keywords\n${seo}\n\n`;
            }

            if (currentType === 'video') {
                const duration = getValue('testing');
                const characters = getValue('structure');
                if (duration) prompt += `## ⏱ Duration\n${duration}\n\n`;
                if (characters) prompt += `## 🎭 Characters / Subjects\n${characters}\n\n`;
            }

            prompt += `## ✅ Quality Requirements\n`;
            if (currentType === 'code') {
                prompt += `- Write clean, modular, well-documented code\n`;
                prompt += `- Follow best practices for the chosen tech stack\n`;
                prompt += `- Include proper error handling and edge cases\n`;
                prompt += `- Ensure code is functional, complete, and production-ready\n`;
                prompt += `- Add comments explaining complex logic\n`;
                prompt += `- Consider security, performance, and accessibility\n`;
            } else if (currentType === 'image') {
                prompt += `- Create visually compelling, balanced composition\n`;
                prompt += `- Ensure proper lighting, shadows, and depth\n`;
                prompt += `- Pay attention to details, textures, and materials\n`;
                prompt += `- Match the specified art style consistently\n`;
                prompt += `- Deliver high-resolution, polished output\n`;
                prompt += `- Avoid artifacts, distortions, or visual errors\n`;
            } else if (currentType === 'writing') {
                prompt += `- Write engaging, well-structured content\n`;
                prompt += `- Ensure clarity, coherence, and logical flow\n`;
                prompt += `- Match the requested tone and voice throughout\n`;
                prompt += `- Use appropriate vocabulary for the audience\n`;
                prompt += `- Include all required key points and sections\n`;
                prompt += `- Deliver polished, publication-ready text\n`;
            } else if (currentType === 'video') {
                prompt += `- Plan coherent visual storytelling with clear narrative\n`;
                prompt += `- Ensure smooth transitions, pacing, and timing\n`;
                prompt += `- Match mood and tone consistently throughout\n`;
                prompt += `- Use appropriate camera angles and shot types\n`;
                prompt += `- Sync audio and visuals effectively\n`;
                prompt += `- Deliver production-ready, professional output\n`;
            }

            document.getElementById('prompt-output').textContent = prompt;
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', generatePrompt);
        });

        function copyPrompt() {
            navigator.clipboard.writeText(document.getElementById('prompt-output').textContent).then(() => {
                const status = document.getElementById('copy-status');
                status.classList.add('visible');
                setTimeout(() => status.classList.remove('visible'), 2000);
            });
        }

        generatePrompt();
    </script>
</body>
</html>
